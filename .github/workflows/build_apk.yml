name: Build Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Signing Configuration
        run: |
          echo "${{ secrets.APP_SIGNING_CONFIG }}" > .env
          K_BASE64=$(grep "^ANDROID_KEYSTORE_BASE64=" .env | cut -d'=' -f2-)
          echo "$K_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/vietlott_data_v${{ env.VERSION }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vietlott_data_v${{ env.VERSION }}
          path: build/app/outputs/flutter-apk/vietlott_data_v${{ env.VERSION }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: build/app/outputs/flutter-apk/vietlott_data_v${{ env.VERSION }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
